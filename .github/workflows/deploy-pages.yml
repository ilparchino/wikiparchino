name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_API_URL: https://francescoborri.ddns.net/wikiparchino
      VITE_BASE_PATH: /wikiparchino/

    steps:
      - name: Verify repository name
        run: |
          if [ "$GITHUB_REPOSITORY" != "ilparchino/wikiparchino" ]; then
            echo "This site must be deployed from ilparchino/wikiparchino so GitHub Pages uses /wikiparchino/."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
